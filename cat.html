<!DOCTYPE html>
<html>
  <head lang="en">
    <meta charset="UTF-8">
    <meta name="viewport" content="with=device-width, initial-scale=1.0">
    <title>Cat Photo App</title>
  </head>
  <body>
    <!-- Your project code will go right here! -->

    <h1>Cat Photo App</h1>
    <h2>Cat Photos</h2>
    <p>Everyone loves cute cats! <a href="https://freecatphotoapp.com" target="_blank">click here to view more cat photos</a>.</p>
    
    <a href="https://freecatphotoapp.com" target="_blank">
        <img src="https://cdn.freecodecamp.org/curriculum/cat-photo-app/relaxing-cat.jpg" alt="A cute orange cat lying on its back.">
    </a>
    <h2>Cat lists</h2>
    <h3>Things cats love:</h3>
    
    <ul>
      <li>Cat nip</li>
      <li>Laser pointers</li>
      <li>Lasagna</li>
    </ul>
    
    <h3>Top 3 things cat hate</h3>
    
    <ol>
      <li>Flea treatment</li>
      <li>Thunder</li>
      <li>Other cats</li>
    </ol>
    
    <h2>Cat Form</h2>
    
    <form action="https://freecatphotoapp.com/sumit-cat-poto">
      
      <label><input type="radio" name="indoor-outdoor" value="indoor" checked> Indoor</label>
      <label><input type="radio" name="indoor-outdoor" value="outdoor" checked> Outdoor</label>
      <br><br>
      
      <label><input type="checkbox" name="personality" value="loving" checked>Loving</label>
      <label><input type="checkbox" name="personality" value="lazy"> Lazy</label>
      <label><input type="checkbox" name="personality" value="energetic"> Energetic</label>
      <br><br>
      
      <input type="text" placeholder="cat photo URL" required>
      <button type="submit">Sumit</button>
    </form>
    
    <footer>
      <p>No Copyright <a href="https://www.freecodecamp.org">freecodecamp.org</a></p>
    </footer>

  </body>
</html>
