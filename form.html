<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Survey Form</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="container">
      <section id="intro">
        <h1>Software Student Survey</h1>
        <p>Help us understand your learning goals and background.</p>
      </section>

      <section class="form-section">
        <form id="survey-form">
          
          <!-- Text Input -->
          <div class="form-group">
            <label id="name-label" for="name">Full Name:</label>
            <input type="text" id="name" placeholder="Enter your name" required>
          </div>
          
          <!-- Email Input -->
          <div class="form-group">
            <label id="email-label" for="email">Email Address:</label>
            <input type="email" id="email" placeholder="Enter your email" required>
          </div> <!-- Closed this box correctly! -->

          <!-- Dropdown Menu -->
          <div class="form-group">
            <label for="dropdown">What is your primary goal?</label>
            <select id="dropdown" required>
              <option value="" disabled selected>Select an option</option>
              <option value="job">Get a software job</option>
              <option value="freelance">Build freelance projects</option>
              <option value="hobby">Learn as a hobby</option>
            </select>
          </div>

          <!-- Checkboxes -->
          <div class="form-group">
            <label>Which technologies do you want to learn? (Select all that apply)</label>
            <div class="checkbox-group">
              <input type="checkbox" id="tech1" value="html"><label for="tech1">HTML & CSS</label>
            </div>
            <div class="checkbox-group">
              <input type="checkbox" id="tech2" value="js"><label for="tech2">JavaScript</label>
            </div>
            <div class="checkbox-group">
              <input type="checkbox" id="tech3" value="git"><label for="tech3">Git & GitHub</label>
            </div>
          </div>
                
          <!-- Submit Button -->
          <button type="submit" id="submit-btn" class="project-btn">Submit Survey</button>
          
        </form>
      </section>
    </main>
  </body>
</html>
